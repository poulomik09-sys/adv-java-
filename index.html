<!DOCTYPE html>
<html>
<head>
<title>Book Search</title>
<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
form{
    background: rgb(236, 51, 147);
    padding: 30px 40px;
    border-radius: 10px;
    box-shadow: 0 0 30px #e30808d2;
    text-align: center;
    width: 400px;
    height:150px;
    animation: popup 0.6s ease;
}
@keyframes popup{
    from{
        opacity: 0;
        transform: scale(0.5);
    }
    to{
        opacity: 1;
        transform: scale(1);

    }
}
input[type="text"]{
    width: 250px;
    padding: 10px;
    margin: 10px 0;
    border: 5px solid #becd4b;
    border-radius: 5px;
    font-size: 16px;
    margin-left:15px ;
}
input[type="submit"]{
 background-color: #4CAF50;
    color: white;
    border: none;
    padding: 12px 30px;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.3s ease;  
    display: block;      
    margin: 20px auto 0;
}
input[type="submit"]:hover{

    background-color: #4550a0;
    transform: scale(1.1);  
}
input[type="submit"]:active{

    transform: scale(1s); 
}
.navbar{
    background-color: #be333353;
    padding: 15px;
    position: fixed;  
    top: 30px;           
    width: 1500px;       
    left:10px;
    display: flex;
    gap: 250px; 
    border-bottom: 3px solid #4CAF50;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}
.navbar a{
    color: white;
    text-decoration:none;
    margin: 0 20px;
    font-size: 18px;
    font-weight: bold;
    border-bottom: 10px solid #4CAF50;
}
.navbar a:hover{
    color: #1963c2;
}
.container{
    margin-top: 100px;
    display: flex;
    justify-content: center;
}
</style>
</head>
<body>
    <div class="navbar">
    <a href="index.html">Home</a>
    <a href="index.html">Search</a>
    <a href="books">Books</a>
    <a href="#">Contact</a>
</div>
<div class="container">
<form action="books" method="get">
  Search: <input type="text" name="key">
  <input type="submit" value="Search">
</form>
</div>
</body>
</html>
